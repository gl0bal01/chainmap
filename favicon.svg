<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="ChainMap">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d2230"/>
      <stop offset="1" stop-color="#0e1016"/>
    </linearGradient>
  </defs>
  <!-- app tile: rounded square, reads on both light and dark browser tabs -->
  <rect x="1.5" y="1.5" width="61" height="61" rx="13" fill="url(#bg)" stroke="#323a4c" stroke-width="1.5"/>
  <!-- fund-flow edges: root disperses to two hops, both funnel into the green sink -->
  <g stroke="#aeb7c4" stroke-width="3.2" stroke-linecap="round" fill="none">
    <line x1="28" y1="19" x2="40" y2="18.5"/>
    <line x1="19" y1="29" x2="18" y2="40"/>
    <line x1="46" y1="25" x2="46" y2="39"/>
    <line x1="25" y1="46" x2="39" y2="46"/>
  </g>
  <!-- directional arrowheads (flow direction) -->
  <g fill="#aeb7c4">
    <polygon points="41.5,18.4 35.5,15.6 35.5,21.4"/>
    <polygon points="18,41.5 15.1,35.5 20.9,35.5"/>
    <polygon points="46,41.5 43.1,35.5 48.9,35.5"/>
    <polygon points="40.5,46 34.5,43.1 34.5,48.9"/>
  </g>
  <!-- nodes -->
  <circle cx="46" cy="18" r="6.8" fill="#4f8ef7" stroke="#0e1016" stroke-width="1.2"/>
  <circle cx="18" cy="46" r="6.2" fill="#f7a24f" stroke="#0e1016" stroke-width="1.2"/>
  <circle cx="46" cy="46" r="7.4" fill="#4fd67a" stroke="#0e1016" stroke-width="1.2"/>
  <!-- root (searched address) — the hero, red with a soft halo -->
  <circle cx="20" cy="21" r="12.5" fill="#e63946" opacity="0.18"/>
  <circle cx="20" cy="21" r="8.5"  fill="#e63946" stroke="#0e1016" stroke-width="1.2"/>
  <circle cx="20" cy="21" r="3.1"  fill="#ffdde1" opacity="0.92"/>
</svg>
